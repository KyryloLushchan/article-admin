<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Доступи — Адмінка</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Доступи</h1>
      <nav class="nav">
        <a href="index.html" class="nav-link">Каталог</a>
        <a href="access.html" class="nav-link active">Доступи</a>
      </nav>
    </div>
    <div class="topbar-right">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-secondary">Вийти</button>
    </div>
  </header>

  <div class="toolbar">
    <input
      type="search"
      id="search"
      placeholder="Пошук за номером або ім'ям…"
      autocomplete="off"
    />
    <button id="add-user-btn" class="btn-primary">+ Додати</button>
    <span id="count" class="count"></span>
  </div>

  <main class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Телефон</th>
          <th>Ім'я</th>
          <th>Telegram ID</th>
          <th>Дата додавання</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p id="status" class="status"></p>
  </main>

  <!-- Модалка додавання користувача -->
  <div id="add-modal" class="modal-overlay" hidden>
    <form id="add-form" class="modal">
      <h2>Новий доступ</h2>
      <label>
        Телефон
        <input
          type="text"
          id="add-phone"
          required
          autocomplete="off"
          placeholder="0XX XXX XX XX"
        />
      </label>
      <label>
        Ім'я (необов'язково)
        <input type="text" id="add-name" autocomplete="off" />
      </label>
      <p id="add-error" class="error" hidden></p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="add-cancel">Скасувати</button>
        <button type="submit" class="btn-primary" id="add-save">Додати</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="access.js"></script>
</body>
</html>
